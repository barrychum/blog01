<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marzipano Cubemap Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marzipano/0.10.2/marzipano.min.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #pano {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            z-index: 1000;
            max-width: 350px;
        }
        .controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        .controls p {
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.5;
        }
        .input-group {
            margin: 10px 0;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            color: #aaa;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background: #222;
            color: white;
            font-size: 13px;
            box-sizing: border-box;
        }
        .mapping {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 12px;
        }
        .mapping-item {
            margin: 4px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #45a049;
        }
        .info {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="pano"></div>
    
    <div class="controls">
        <h3>📦 Cubemap Viewer</h3>
        <p>Enter the path to your images:</p>
        
        <div class="input-group">
            <label>Image folder path (optional):</label>
            <input type="text" id="basePath" placeholder="./ or /path/to/images/" value="/img/pano-test/">
        </div>
        
        <div class="mapping">
            <strong>Face Mapping:</strong>
            <div class="mapping-item">0.jpg → <span id="face0">Front</span></div>
            <div class="mapping-item">1.jpg → <span id="face1">Right</span></div>
            <div class="mapping-item">2.jpg → <span id="face2">Back</span></div>
            <div class="mapping-item">3.jpg → <span id="face3">Left</span></div>
            <div class="mapping-item">4.jpg → <span id="face4">Up</span></div>
            <div class="mapping-item">5.jpg → <span id="face5">Down</span></div>
        </div>
        
        <button id="loadBtn">Load Panorama</button>
        
        <p class="info">💡 Drag to look around, scroll to zoom</p>
    </div>

    <script>
        const basePathInput = document.getElementById('basePath');
        const loadBtn = document.getElementById('loadBtn');
        
        // Face mapping: index to cube face
        // Adjust this mapping based on how your images are oriented
        const faceMapping = {
            0: 'f',  // front
            1: 'r',  // right
            2: 'b',  // back
            3: 'l',  // left
            4: 'u',  // up
            5: 'd'   // down
        };
        
        // Reverse mapping for display
        const faceNames = {
            'f': 'Front',
            'r': 'Right',
            'b': 'Back',
            'l': 'Left',
            'u': 'Up',
            'd': 'Down'
        };
        
        let viewer = null;
        let scene = null;
        
        loadBtn.addEventListener('click', function() {
            const basePath = basePathInput.value.trim();
            
            // Create viewer if it doesn't exist
            if (!viewer) {
                const panoElement = document.getElementById('pano');
                viewer = new Marzipano.Viewer(panoElement);
            }
            
            // Define geometry (cube)
            const geometry = new Marzipano.CubeGeometry([
                { tileSize: 1024, size: 1024 }
            ]);
            
            // Create source with numbered images
            const cubeSource = new Marzipano.ImageUrlSource(function(tile) {
                const face = tile.face;
                
                // Find which number corresponds to this face
                let imageNumber = 0;
                for (let num in faceMapping) {
                    if (faceMapping[num] === face) {
                        imageNumber = num;
                        break;
                    }
                }
                
                const url = basePath + imageNumber + '.jpg';
                return { url: url };
            });
            
            // Define view parameters
            const limiter = Marzipano.RectilinearView.limit.traditional(
                1024,
                100 * Math.PI / 180
            );
            
            const view = new Marzipano.RectilinearView(
                { yaw: 0, pitch: 0, fov: Math.PI / 2 },
                limiter
            );
            
            // Destroy existing scene if any
            if (scene) {
                scene.destroy();
            }
            
            // Create scene
            scene = viewer.createScene({
                source: cubeSource,
                geometry: geometry,
                view: view,
                pinFirstLevel: true
            });
            
            // Switch to the scene
            scene.switchTo();
            
            // Fade out controls after loading
            setTimeout(() => {
                document.querySelector('.controls').style.transition = 'opacity 0.5s';
                document.querySelector('.controls').style.opacity = '0.3';
            }, 2000);
            
            // Show controls on hover
            const controls = document.querySelector('.controls');
            controls.addEventListener('mouseenter', function() {
                this.style.opacity = '1';
            });
            controls.addEventListener('mouseleave', function() {
                this.style.opacity = '0.3';
            });
        });
        
        // Auto-load on page load
        window.addEventListener('load', function() {
            loadBtn.click();
        });
    </script>
</body>
</html>
