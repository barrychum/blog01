<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marzipano in Viewport</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marzipano/0.10.2/marzipano.min.js"></script>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .viewer-wrapper {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        /* Set specific dimensions for the panorama viewer */
        #pano {
            width: 100%;
            height: 500px; /* Change this to any height you want */
            position: relative;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .controls h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .size-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input[type="range"] {
            width: 100%;
        }
        
        .range-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            font-weight: 500;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .mapping {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            font-size: 13px;
        }
        
        .mapping-item {
            margin: 5px 0;
            color: #555;
        }
        
        .info {
            font-size: 12px;
            color: #888;
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            #pano {
                height: 300px;
            }
            
            .size-controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Marzipano Viewport Demo</h1>
        
        <div class="viewer-wrapper">
            <div id="pano"></div>
        </div>
        
        <div class="controls">
            <h3>Configuration</h3>
            
            <div class="input-group">
                <label>Image folder path:</label>
                <input type="text" id="basePath" placeholder="./ or /path/to/images/" value="/img/pano-test/">
            </div>
            
            <div class="size-controls">
                <div class="input-group">
                    <label>Viewer Height: <span id="heightValue">500px</span></label>
                    <input type="range" id="heightSlider" min="200" max="800" value="500" step="50">
                </div>
                
                <div class="input-group">
                    <label>Viewer Width: <span id="widthValue">100%</span></label>
                    <input type="range" id="widthSlider" min="50" max="100" value="100" step="10">
                </div>
            </div>
            
            <div class="mapping">
                <strong>Face Mapping:</strong>
                <div class="mapping-item">0.jpg → Front</div>
                <div class="mapping-item">1.jpg → Right</div>
                <div class="mapping-item">2.jpg → Back</div>
                <div class="mapping-item">3.jpg → Left</div>
                <div class="mapping-item">4.jpg → Up</div>
                <div class="mapping-item">5.jpg → Down</div>
            </div>
            
            <button id="loadBtn">Load Panorama</button>
            
            <div class="info">
                💡 <strong>Tips:</strong><br>
                • Drag to look around, scroll to zoom<br>
                • Adjust the sliders to resize the viewer<br>
                • The viewer can be any size you want!
            </div>
        </div>
    </div>

    <script>
        const basePathInput = document.getElementById('basePath');
        const loadBtn = document.getElementById('loadBtn');
        const panoElement = document.getElementById('pano');
        const heightSlider = document.getElementById('heightSlider');
        const widthSlider = document.getElementById('widthSlider');
        const heightValue = document.getElementById('heightValue');
        const widthValue = document.getElementById('widthValue');
        
        // Face mapping
        const faceMapping = {
            0: 'f',  // front
            1: 'r',  // right
            2: 'b',  // back
            3: 'l',  // left
            4: 'u',  // up
            5: 'd'   // down
        };
        
        let viewer = null;
        let scene = null;
        
        // Handle viewport resizing
        heightSlider.addEventListener('input', function() {
            const height = this.value + 'px';
            panoElement.style.height = height;
            heightValue.textContent = height;
            if (viewer) {
                viewer.updateSize();
            }
        });
        
        widthSlider.addEventListener('input', function() {
            const width = this.value + '%';
            panoElement.style.width = width;
            widthValue.textContent = width;
            if (viewer) {
                viewer.updateSize();
            }
        });
        
        loadBtn.addEventListener('click', function() {
            const basePath = basePathInput.value.trim();
            
            // Create viewer if it doesn't exist
            if (!viewer) {
                viewer = new Marzipano.Viewer(panoElement);
            }
            
            // Define geometry (cube)
            const geometry = new Marzipano.CubeGeometry([
                { tileSize: 1024, size: 1024 }
            ]);
            
            // Create source with numbered images
            const cubeSource = new Marzipano.ImageUrlSource(function(tile) {
                const face = tile.face;
                
                // Find which number corresponds to this face
                let imageNumber = 0;
                for (let num in faceMapping) {
                    if (faceMapping[num] === face) {
                        imageNumber = num;
                        break;
                    }
                }
                
                const url = basePath + imageNumber + '.jpg';
                return { url: url };
            });
            
            // Define view parameters
            const limiter = Marzipano.RectilinearView.limit.traditional(
                1024,
                100 * Math.PI / 180
            );
            
            const view = new Marzipano.RectilinearView(
                { yaw: 0, pitch: 0, fov: Math.PI / 2 },
                limiter
            );
            
            // Destroy existing scene if any
            if (scene) {
                scene.destroy();
            }
            
            // Create scene
            scene = viewer.createScene({
                source: cubeSource,
                geometry: geometry,
                view: view,
                pinFirstLevel: true
            });
            
            // Switch to the scene
            scene.switchTo();
        });
        
        // Auto-load on page load
        window.addEventListener('load', function() {
            loadBtn.click();
        });
    </script>
</body>
</html>
